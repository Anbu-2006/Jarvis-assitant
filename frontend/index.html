<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS</title>
    <meta name="description" content="JARVIS — Just A Rather Very Intelligent System. Voice-first AI assistant." />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="orb-canvas"></canvas>

    <!-- HUD: Top Status Bar -->
    <div id="hud-top-left" class="brutalist-hud">
      <div class="hud-item"><span class="hud-label">ENGINE</span><span id="hud-provider" class="glitch-text">AWAITING</span></div>
      <div class="hud-item"><span class="hud-label">PLATFORM</span><span id="hud-platform">WIN64</span></div>
      <div class="hud-item"><span class="hud-label">UPTIME</span><span id="hud-uptime" class="glitch-text">00:00</span></div>
    </div>

    <!-- HUD: Left Panel (Logs & Tasks) -->
    <div id="hud-left-panel" class="brutalist-panel hud-left">
      <div class="panel-header">ACTIVE PROCESSES</div>
      <div id="hud-tasks" class="panel-content">
        <span class="hud-empty">NO ACTIVE TASKS</span>
      </div>
      <div class="panel-header mt-4">SYSTEM LOGS</div>
      <div id="hud-logs" class="panel-content logs-feed">
        <div>[SYS] Waiting for initialization...</div>
      </div>
    </div>

    <!-- HUD: Right Panel (Diagnostics & Directives) -->
    <div id="hud-right-panel" class="brutalist-panel hud-right">
      <div class="panel-header">DIAGNOSTICS</div>
      <div class="panel-content">
        <div class="hud-row"><span>MEMORY:</span> <span id="hud-diag-memory" class="text-neon">--</span></div>
        <div class="hud-row"><span>TASKS:</span> <span id="hud-diag-tasks" class="text-neon">--</span></div>
        <div class="hud-row"><span>TTS:</span> <span id="hud-diag-tts" class="text-neon">--</span></div>
        <div class="hud-row"><span>AUDIO:</span> <span id="hud-audio-status" class="text-neon">WAITING</span></div>
        <div class="hud-row"><span>COPILOT:</span> <span id="hud-copilot-status" class="text-neon">IDLE</span></div>
      </div>
      <div class="panel-header mt-4">SYSTEM DIRECTIVES</div>
      <div id="hud-needed" class="panel-content">
        <div class="needed-item warning">AWAITING INIT</div>
      </div>
    </div>

    <!-- Initialize Overlay -->
    <div id="init-overlay" class="init-overlay">
      <div class="init-content">
        <h1 class="init-title glitch-text">SYSTEM STANDBY</h1>
        <p class="init-subtitle text-neon">AUDIO CONTEXT REQUIRES MANUAL ACTIVATION</p>
        <button id="btn-initialize" class="btn-brutalist huge">INITIALIZE J.A.R.V.I.S.</button>
      </div>
    </div>

    <!-- Controls — top right -->
    <div id="controls">
      <button id="btn-mute" title="Mute/Unmute">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
      </button>
      <button id="btn-menu" title="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>

    <!-- Dropdown menu -->
    <div id="menu-dropdown" style="display:none">
      <button id="btn-settings">Settings</button>
      <button id="btn-restart">Restart Server</button>
      <button id="btn-fix-self">Fix Yourself</button>
    </div>

    <div id="status-text"></div>
    <div id="jarvis-label">JARVIS</div>
    <div id="error-text"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
